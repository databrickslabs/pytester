name: acceptance

on:
  pull_request:
    types: [ opened, synchronize ]
  merge_group:
    types: [ checks_requested ]
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        python: [ '3.10', '3.11', '3.12', '3.13', '3.14' ]
    environment:
      name: account-admin
      deployment: false
    permissions:
      # Access to the integration testing infrastructure.
      id-token: write
      # Write test results to the PR.
      pull-requests: write
    runs-on:
      group: larger-runners
      labels: larger
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098  # v7.3.1
        with:
          version: "0.11.2"
          checksum: "7ac2ca0449c8d68dae9b99e635cd3bc9b22a4cb1de64b7c43716398447d42981"

      - name: Setup for JFrog
        uses: ./.github/actions/jfrog-auth

      - name: Fetch relevant branches
        run: |
          git fetch origin $GITHUB_BASE_REF:$GITHUB_BASE_REF
          git fetch origin $GITHUB_HEAD_REF:$GITHUB_HEAD_REF

      - name: Run integration tests
        uses: databrickslabs/sandbox/acceptance@3313d06ce86227537b3f37f5974f7eecb2a8e59a  # acceptance/v0.4.4
        with:
          vault_uri: ${{ secrets.VAULT_URI }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
