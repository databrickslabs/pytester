
name: downstreams

on:
  pull_request:
    types: [opened, synchronize]
  merge_group:
    types: [checks_requested]
  push:
    # Always run on push to main. The build cache can only be reused
    # if it was saved by a run from the repository's default branch.
    # The run result will be identical to that from the merge queue
    # because the commit is identical, yet we need to perform it to
    # seed the build cache.
    branches:
      - main

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  HATCH_VERBOSE: "2"
  HATCH_VERSION: "1.16.5"

jobs:
  compatibility:
    strategy:
      fail-fast: false
      matrix:
        downstream:
          - name: ucx
          - name: remorph
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          cache: 'pip'
          cache-dependency-path: '**/pyproject.toml'
          # Downstream currently just tests with system python rather than controlling the versions properly.
          python-version: '3.10'

      - name: Install toolchain
        run: |
          pip install "hatch==${HATCH_VERSION}"

      - name: Downstreams
        uses: databrickslabs/sandbox/downstreams@acceptance/v0.4.2
        with:
          repo: ${{ matrix.downstream.name }}
          org: databrickslabs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
