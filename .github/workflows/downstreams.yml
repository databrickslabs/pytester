
name: downstreams

on:
  pull_request:
    types: [opened, synchronize]
  merge_group:
    types: [checks_requested]
  push:
    # Always run on push to main. The build cache can only be reused
    # if it was saved by a run from the repository's default branch.
    # The run result will be identical to that from the merge queue
    # because the commit is identical, yet we need to perform it to
    # seed the build cache.
    branches:
      - main

permissions:
  contents: read

jobs:
  compatibility:
    permissions:
      # Access to the integration testing infrastructure.
      id-token: write
      # Write test results to the PR.
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        downstream:
          - name: ucx
          - name: remorph
    runs-on:
      group: databrickslabs-protected-runner-group
      labels: linux-ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098  # v7.3.1
        with:
          version: "0.11.2"
          checksum: "7ac2ca0449c8d68dae9b99e635cd3bc9b22a4cb1de64b7c43716398447d42981"

      - name: Setup for JFrog
        uses: ./.github/actions/jfrog-auth

      - name: Downstreams
        uses: databrickslabs/sandbox/downstreams@3313d06ce86227537b3f37f5974f7eecb2a8e59a  # downstreams/v0.0.1
        with:
          repo: ${{ matrix.downstream.name }}
          org: databrickslabs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
